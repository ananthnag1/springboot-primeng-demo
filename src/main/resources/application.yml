spring:
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  # H2 Console Configuration
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # Security Configuration
  security:
    user:
      name: admin
      password: password123
    headers:
      frame:
        options: SAMEORIGIN